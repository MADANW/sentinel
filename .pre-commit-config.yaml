# Pre-commit hooks — run automatically before every commit.
#
# Setup (one-time):
#   pip install pre-commit
#   pre-commit install
#
# Run manually on all files:
#   pre-commit run --all-files

repos:
  # ── Secret scanning ──────────────────────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.2
    hooks:
      - id: gitleaks
        name: Detect hardcoded secrets (gitleaks)

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      # Prevent committing .env files
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: detect-private-key
        name: Detect private keys
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-json
      - id: check-toml

  # ── Python security linting ──────────────────────────────────────────────
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.7
    hooks:
      - id: bandit
        name: Python security linting (bandit)
        args: ["-c", "pyproject.toml"]
        # Focus on high-severity issues only to reduce noise
        additional_dependencies: ["bandit[toml]"]

  # ── Python linting ───────────────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.2
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # ── Prevent committing directly to main ──────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: no-commit-to-branch
        args: ['--branch', 'main', '--branch', 'master']
        name: Block direct commits to main/master
