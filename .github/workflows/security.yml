name: Security Checks

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

jobs:
  # ── 0. Guard: TRADING_ENV must never be live in CI ────────────────────────
  block-live-trading-in-ci:
    name: Assert TRADING_ENV is not live
    runs-on: ubuntu-latest
    steps:
      - name: Assert TRADING_ENV is not live
        run: |
          if [ "${TRADING_ENV:-paper}" = "live" ]; then
            echo "ERROR: TRADING_ENV=live must never be set in CI"
            exit 1
          fi

  # ── 0. Guard: env example files must not contain real values ─────────────
  verify-no-secrets-in-env-examples:
    name: Check env example files have no real values
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check env example files have no real values
        run: |
          for f in .env.example dashboard/.env.local.example; do
            echo "Checking $f..."
            if grep -E '=.{8,}' "$f" \
                | grep -v '^#' \
                | grep -v '=$' \
                | grep -v '=your_' \
                | grep -v '=<' \
                | grep -v '=paper' \
                | grep -v '=https://' \
                | grep -v '=100000' \
                | grep -v '=PA' \
                | grep -q .; then
              echo "ERROR: $f appears to contain real credential values"
              exit 1
            fi
          done
          echo "All env example files look clean."

  # ── 0. Guard: classifier.sha256 must be committed ────────────────────────
  assert-sha256-file-committed:
    name: Verify classifier.sha256 is committed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify classifier.sha256 exists and is in git
        run: |
          if [ ! -f models/classifier.sha256 ]; then
            echo "ERROR: models/classifier.sha256 is missing."
            echo "Run backend/scripts/train_model.py to generate it."
            exit 1
          fi
          git ls-files --error-unmatch models/classifier.sha256
          echo "classifier.sha256 is present and committed."

  # ── 0. Guard: no .pkl files should be committed ──────────────────────────
  check-no-pkl-committed:
    name: Verify no .pkl files are committed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for committed .pkl files
        run: |
          if git ls-files | grep -q '\.pkl$'; then
            echo "ERROR: .pkl file found in git index:"
            git ls-files | grep '\.pkl$'
            echo "Remove with: git rm --cached <file>"
            exit 1
          fi
          echo "No .pkl files committed."

  # ── 1. Secret scanning ────────────────────────────────────────────────────
  gitleaks:
    name: Scan for secrets (gitleaks)
    runs-on: ubuntu-latest
    needs: [block-live-trading-in-ci]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for accurate scanning
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 2. Python dependency audit ────────────────────────────────────────────
  pip-audit:
    name: Audit Python dependencies
    runs-on: ubuntu-latest
    needs: [block-live-trading-in-ci]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit requirements
        run: pip-audit -r backend/requirements.txt --strict

  # ── 3. Python security linting ────────────────────────────────────────────
  bandit:
    name: Python security lint (bandit)
    runs-on: ubuntu-latest
    needs: [block-live-trading-in-ci]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install bandit
        run: pip install "bandit[toml]"
      - name: Run bandit
        run: bandit -r backend/ -c pyproject.toml --severity-level medium

  # ── 4. Python unit tests ──────────────────────────────────────────────────
  test-risk-engine:
    name: Python unit tests
    runs-on: ubuntu-latest
    needs: [block-live-trading-in-ci]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies (hash-verified)
        # --require-hashes: every package must match its pinned SHA-256 digest.
        # A supply-chain swap of any package causes this step to fail.
        run: pip install --require-hashes -r backend/requirements.txt
      - name: Run tests
        run: pytest backend/tests/ -v --tb=short

  # ── 5. Node.js dependency audit ──────────────────────────────────────────
  npm-audit:
    name: Audit Node.js dependencies
    runs-on: ubuntu-latest
    needs: [block-live-trading-in-ci]
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Check dashboard exists
        id: check
        run: test -f package.json && echo "exists=true" >> "$GITHUB_OUTPUT" || echo "exists=false" >> "$GITHUB_OUTPUT"
      - name: Install dependencies (respects lock file exactly)
        if: steps.check.outputs.exists == 'true'
        # npm ci installs from package-lock.json without modification — never upgrades.
        run: npm ci
      - name: Audit
        if: steps.check.outputs.exists == 'true'
        run: npm audit --audit-level=high
